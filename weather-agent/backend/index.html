<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0f19" />
  <title>AURA - Agentic Weather & Reminder Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: rgba(22, 28, 45, 0.45);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;
      --card-weather-bg: rgba(14, 165, 233, 0.08);
      --card-weather-border: rgba(14, 165, 233, 0.2);
      --card-reminder-bg: rgba(245, 158, 11, 0.08);
      --card-reminder-border: rgba(245, 158, 11, 0.2);
      --font-family: 'Outfit', sans-serif;
      --transition-speed: 0.3s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-primary);
      overflow-x: hidden;
      min-height: 100vh;
    }

    .app-container {
      position: relative;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    /* Background glows */
    .background-glows {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
    }

    .glow-1 {
      top: -10%;
      left: 20%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
    }

    .glow-2 {
      bottom: -10%;
      right: 15%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
    }

    /* Container */
    .card-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 750px;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 45px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    /* Header */
    .app-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .logo-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-spark {
      font-size: 28px;
      animation: float 3s ease-in-out infinite;
    }

    .app-header h1 {
      font-size: 40px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 350;
      letter-spacing: 0.5px;
    }

    /* Memory Badge */
    .memory-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 30px;
      padding: 8px 16px;
      margin-bottom: 25px;
      font-size: 13.5px;
      color: var(--accent-cyan);
      width: 100%;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.4s ease-out;
    }

    .memory-icon {
      font-size: 16px;
    }

    .memory-text {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Input group */
    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }

    input {
      flex: 1;
      background: rgba(10, 15, 26, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 16px 20px;
      font-family: var(--font-family);
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: all var(--transition-speed);
    }

    input:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
      background: rgba(10, 15, 26, 0.8);
    }

    input:disabled {
      opacity: 0.6;
    }

    button {
      background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px 28px;
      font-family: var(--font-family);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all var(--transition-speed);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Empty state and Suggestions */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      animation: fadeIn 0.5s ease-out;
    }

    .empty-state p {
      margin-bottom: 24px;
      font-size: 15.5px;
      font-weight: 400;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .suggestion-chip {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 10px 18px;
      font-size: 13.5px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition-speed) ease;
    }

    .suggestion-chip:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-blue);
      transform: scale(1.03);
    }

    /* Response Cards */
    .response-box {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .response-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 22px;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .response-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    .response-card.weather-card {
      background: var(--card-weather-bg);
      border-color: var(--card-weather-border);
    }

    .response-card.reminder-card {
      background: var(--card-reminder-bg);
      border-color: var(--card-reminder-border);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 10px;
    }

    .card-icon {
      font-size: 20px;
    }

    .card-header h3 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .weather-card .card-header h3 {
      color: #38bdf8;
    }

    .reminder-card .card-header h3 {
      color: #fbbf24;
    }

    .card-body {
      font-size: 14.5px;
      line-height: 1.6;
      color: #e2e8f0;
    }

    .card-body p {
      margin-bottom: 8px;
    }

    .card-body p:last-child {
      margin-bottom: 0;
    }

    /* Keyframes */
    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .card-container {
        padding: 25px;
      }
      .input-group {
        flex-direction: column;
      }
      button {
        width: 100%;
        justify-content: center;
      }
      .app-header h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="background-glows">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
    </div>

    <div class="card-container">
      <header className="app-header">
        <div class="logo-section">
          <div class="logo-spark">✨</div>
          <h1>AURA</h1>
        </div>
        <p class="subtitle" style="text-align: center; margin-bottom: 25px;">Agentic Weather & Reminder Assistant</p>
      </header>

      <div id="memoryBadge" class="memory-badge">
        <span class="memory-icon">🧠</span>
        <span id="memoryText" class="memory-text">Memory: None</span>
      </div>

      <div class="input-group">
        <input
          type="text"
          id="messageInput"
          placeholder="Try: check weather and remind me to carry umbrella"
        />
        <button id="sendButton">
          <span id="buttonSpinner" class="spinner"></span>
          <span id="buttonText">Send</span>
          <svg id="buttonIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <div class="response-box" id="responseBox">
        <div class="empty-state" id="emptyState">
          <p>Ask AURA to check the weather in Kochi, set a reminder, or both!</p>
          <div class="suggestions">
            <div class="suggestion-chip" onclick="setQuery('check weather in Kochi')">
              🌤️ Check weather
            </div>
            <div class="suggestion-chip" onclick="setQuery('remind me to carry water bottle')">
              ⏰ Set a reminder
            </div>
            <div class="suggestion-chip" onclick="setQuery('check weather and remind me to buy milk')">
              ⚡ Both together
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "/chat";
    const MEMORY_URL = "/memory";

    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const buttonSpinner = document.getElementById("buttonSpinner");
    const buttonText = document.getElementById("buttonText");
    const buttonIcon = document.getElementById("buttonIcon");
    const responseBox = document.getElementById("responseBox");
    const emptyState = document.getElementById("emptyState");
    const memoryBadge = document.getElementById("memoryBadge");
    const memoryText = document.getElementById("memoryText");

    // Load saved memory on page load
    loadMemory();

    // Event Listeners
    sendButton.addEventListener("click", handleSend);
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleSend();
    });

    function setQuery(text) {
      messageInput.value = text;
      messageInput.focus();
    }

    async function loadMemory() {
      try {
        const response = await fetch(MEMORY_URL);
        if (response.ok) {
          const data = await response.json();
          if (data && data.last_message) {
            memoryText.textContent = `Memory: "${data.last_message}"`;
            memoryBadge.style.display = "inline-flex";
          }
        }
      } catch (error) {
        console.error("Failed to load memory:", error);
      }
    }

    async function handleSend() {
      const message = messageInput.value.trim();
      if (!message) return;

      setLoading(true);

      // Remove existing response cards
      const cards = responseBox.querySelectorAll(".response-card");
      cards.forEach(card => card.remove());
      emptyState.style.display = "none";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        if (response.ok) {
          const data = await response.json();
          renderResponses(data.response || []);
          await loadMemory();
        } else {
          alert("Backend Error - Please make sure Gemini API key is configured and try again.");
          emptyState.style.display = "block";
        }
      } catch (error) {
        console.error("Connection failed:", error);
        alert("Connection to backend failed. Please verify the FastAPI backend is running.");
        emptyState.style.display = "block";
      } finally {
        setLoading(false);
      }
    }

    function setLoading(isLoading) {
      if (isLoading) {
        sendButton.disabled = true;
        messageInput.disabled = true;
        buttonSpinner.style.display = "inline-block";
        buttonIcon.style.display = "none";
        buttonText.textContent = "Loading...";
      } else {
        sendButton.disabled = false;
        messageInput.disabled = false;
        buttonSpinner.style.display = "none";
        buttonIcon.style.display = "inline-block";
        buttonText.textContent = "Send";
      }
    }

    function renderResponses(responseList) {
      if (responseList.length === 0) {
        emptyState.style.display = "block";
        return;
      }

      responseList.forEach(item => {
        const lowerItem = item.toLowerCase();
        const isWeather = lowerItem.includes("weather") || lowerItem.includes("kochi");
        const isReminder = lowerItem.includes("reminder") || lowerItem.includes("remind");

        const card = document.createElement("div");
        card.className = `response-card ${isWeather ? 'weather-card' : isReminder ? 'reminder-card' : ''}`;

        const cardHeader = document.createElement("div");
        cardHeader.className = "card-header";

        const cardIcon = document.createElement("span");
        cardIcon.className = "card-icon";
        cardIcon.textContent = isWeather ? "🌤️" : isReminder ? "🔔" : "🤖";

        const cardTitle = document.createElement("h3");
        cardTitle.textContent = isWeather ? "Weather Intelligence Agent" : isReminder ? "Reminder Agent" : "Coordinator Agent";

        cardHeader.appendChild(cardIcon);
        cardHeader.appendChild(cardTitle);

        const cardBody = document.createElement("div");
        cardBody.className = "card-body";

        item.split("\n").forEach(line => {
          if (line.trim()) {
            const p = document.createElement("p");
            p.textContent = line;
            cardBody.appendChild(p);
          }
        });

        card.appendChild(cardHeader);
        card.appendChild(cardBody);
        responseBox.appendChild(card);
      });
    }
  </script>
</body>
</html>
